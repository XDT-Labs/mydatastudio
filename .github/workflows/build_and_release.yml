name: Build and Release

on:
  push:
    branches: ["main", "feature/actions"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3). Reads from pubspec.yaml if empty.'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build macOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------
      # 1. Set up Python + PDM (shared by models and Python service build)
      # ------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.11"

      - name: Install HuggingFace CLI
        run: pip install "huggingface_hub[cli]>=0.24"

      # ------------------------------------------
      # 2. Download AI Models via Makefile
      # ------------------------------------------
      - name: Download Models
        if: false  # TODO: re-enable before shipping — disabled to speed up debug builds
        run: make models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Ensure models directory exists
        run: |
          mkdir -p aiserver/models
          [ -z "$(ls -A aiserver/models 2>/dev/null)" ] && touch aiserver/models/placeholder.txt || true

      # ------------------------------------------
      # 3. Build Python (aiserver) Service via Makefile
      # ------------------------------------------
      - name: Install Build Tools
        run: brew install cmake ninja

      - name: Build Python Service
        run: make build-python
        env:
          FORCE_CMAKE: "1"
          CMAKE_ARGS: "-DGGML_METAL=on -DGGML_NATIVE=off"

      # ------------------------------------------
      # 4. Set up Flutter and prepare the Xcode project first
      #    (flutter pub get runs SPM integration which rewrites project.pbxproj;
      #     signing must be applied AFTER this, not before)
      # ------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          architecture: x64

      - name: Configure Flutter
        run: |
          flutter config --enable-macos-desktop
          flutter config --no-enable-swift-package-manager

      - name: Flutter pub get
        working-directory: client
        run: |
          cp pubspec.prod.yaml pubspec.yaml
          flutter pub get

      # ------------------------------------------
      # 5. Apple Code Signing (applied after pub get so SPM can't overwrite it)
      # ------------------------------------------
      - name: Validate signing secrets
        env:
          CERT: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          PROFILE: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASS: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          MISSING=""
          [ -z "$CERT" ]         && MISSING="$MISSING\n  - BUILD_CERTIFICATE_BASE64"
          [ -z "$PROFILE" ]      && MISSING="$MISSING\n  - BUILD_PROVISION_PROFILE_BASE64"
          [ -z "$P12_PASS" ]     && MISSING="$MISSING\n  - P12_PASSWORD"
          [ -z "$KEYCHAIN_PASS" ] && MISSING="$MISSING\n  - KEYCHAIN_PASSWORD"
          if [ -n "$MISSING" ]; then
            printf "Error: missing required signing secrets:%b\n" "$MISSING"
            exit 1
          fi

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}

          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > $PP_PATH
          # Verify the P12 is valid before importing (gives a clear error if wrong file/password)
          openssl pkcs12 -in $CERTIFICATE_PATH -nokeys -passin pass:"$P12_PASSWORD" -legacy 2>&1 | head -5 || {
            echo "ERROR: Could not read P12. Check BUILD_CERTIFICATE_BASE64 (must be a .p12, not .cer) and P12_PASSWORD."
            exit 1
          }
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          curl -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Update Code Signing Settings
        working-directory: client
        run: |
          UUID=$(python3 -c "import plistlib,os; d=open(os.environ['RUNNER_TEMP']+'/build_pp.mobileprovision','rb').read(); s=d.find(b'<?xml'); e=d.rfind(b'</plist>')+8; print(plistlib.loads(d[s:e])['UUID'])")
          echo "Provisioning Profile UUID: $UUID"
          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" | head -1 | grep '"' | sed 's/.*"\(.*\)".*/\1/')
          echo "Code Signing Identity: $IDENTITY"
          if [ -z "$IDENTITY" ]; then
            echo "Error: No Code Signing Identity found."
            exit 1
          fi
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"[^\"]*\";/PROVISIONING_PROFILE_SPECIFIER = \"$UUID\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/CODE_SIGN_IDENTITY = \"[^\"]*\";/CODE_SIGN_IDENTITY = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/\"CODE_SIGN_IDENTITY\[sdk=macosx\*\]\" = \"[^\"]*\";/\"CODE_SIGN_IDENTITY[sdk=macosx*]\" = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj

      # ------------------------------------------
      # 6. Build Flutter Client via Makefile
      # ------------------------------------------
      - name: Build Flutter Client
        run: make build-client

      # ------------------------------------------
      # 7. Create DMG installer
      # ------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Create DMG
        working-directory: client
        run: appdmg installers/dmg_creator/config.json build/macos/Build/Products/Release/MyDataStudio.dmg

      # ------------------------------------------
      # 7. Resolve version tag
      # ------------------------------------------
      - name: Resolve Version Tag
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=v${INPUT_VERSION}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' client/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------
      # 8. Upload artifacts
      # ------------------------------------------
      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: client/build/macos/Build/Products/Release/MyDataStudio.dmg

      - name: Upload Python Service Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiserver-macos
          path: client/app/aiserver-macos.zip

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision 2>/dev/null || true

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Version Tag
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=v${INPUT_VERSION}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep '^version:' client/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MyDataStudio ${{ steps.version.outputs.tag }}
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/aiserver-macos/*.zip
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
