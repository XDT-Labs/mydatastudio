# CI build triggered on pushes to feature/cicd for pipeline testing.
# For production releases use the "Build and Release" workflow (workflow_dispatch).
name: CI Build

on:
  push:
    branches: ["feature/actions"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS (CI)
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------------------------
      # 1. Set up Python + PDM
      # ------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.11"

      - name: Install HuggingFace CLI
        run: pip install "huggingface_hub[cli]>=0.24"

      # ------------------------------------------
      # 2. Download Models via Makefile
      # ------------------------------------------
      - name: Download Models
        run: make models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}

      # ------------------------------------------
      # 3. Build Python Service via Makefile
      # ------------------------------------------
      - name: Install Build Tools
        run: brew install cmake ninja

      - name: Build Python Service
        run: make build-python
        env:
          FORCE_CMAKE: "1"
          CMAKE_ARGS: "-DGGML_METAL=on -DGGML_NATIVE=off"

      # ------------------------------------------
      # 4. Apple Code Signing
      # ------------------------------------------
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          curl -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Update Code Signing Settings
        working-directory: client
        run: |
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision))
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | head -1 | grep '"' | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "Error: No Code Signing Identity found."
            exit 1
          fi
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$UUID\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/CODE_SIGN_IDENTITY = \"-\";/CODE_SIGN_IDENTITY = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/\"CODE_SIGN_IDENTITY\[sdk=macosx\*\]\" = \"Apple Development\";/\"CODE_SIGN_IDENTITY[sdk=macosx*]\" = \"$IDENTITY\";/g" macos/Runner.xcodeproj/project.pbxproj

      # ------------------------------------------
      # 5. Build Flutter Client via Makefile
      # ------------------------------------------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build Flutter Client
        run: make build-client

      # ------------------------------------------
      # 6. Create DMG installer
      # ------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Create DMG
        working-directory: client
        run: appdmg installers/dmg_creator/config.json build/macos/Build/Products/Release/MyDataStudio.dmg

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-ci-dmg
          path: client/build/macos/Build/Products/Release/MyDataStudio.dmg

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision 2>/dev/null || true
